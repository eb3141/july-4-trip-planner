name: Repo Heartbeat (prevents 60-day auto-disable)

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch: {}

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Record heartbeat
        run: |
          mkdir -p .github
          date -u +"Last heartbeat: %Y-%m-%dT%H:%M:%SZ" > .github/.heartbeat
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/.heartbeat
          git diff --staged --quiet || git commit -m "chore: monthly heartbeat (keep scheduled workflows active)"
          git push
