name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          # Follow Streamlit's auth-cookie handshake (-L with a cookie jar) so the
          # request actually loads the app and returns HTTP 200, instead of stopping
          # at the initial 303 redirect. -f makes a real 4xx/5xx fail the step.
          curl -sSfL -c /tmp/cookies.txt -b /tmp/cookies.txt --max-redirs 10 -o /dev/null \
            -w "HTTP %{http_code}\n" \
            "https://july-4-trip-planner-n7rhe3bsyzkeacjbmrytwf.streamlit.app/"
